name: health_app_mobile
description: "Medical IoT Patient Monitoring System Mobile Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^12.1.3
  
  # HTTP abstraction for FastAPI
  http: ^1.2.0

  # Charts
  fl_chart: ^0.65.0
  
  # Secure storage
  flutter_secure_storage: ^9.0.0
  
  # Styling & Typography
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.2

  # Date/Time formatting
  intl: ^0.19.0

  # JWT decoding (to read user info from token)
  jwt_decoder: ^2.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true
